<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vendor Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    min-height: 100vh;
}

/* LOGIN / REGISTER */
.container {
    width: 350px;
    margin: 80px auto;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #333;
    color: white;
}

.link {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    text-decoration: underline;
}

/* DASHBOARD */
#dashboard {
    display: none;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #4facfe;
}

.profile input {
    display: none;
}

/* LOGOUT BUTTON FIX */
.logout-btn {
    width: auto;
    padding: 8px 15px;
    background: #ff4d4d;
    color: white;
    border-radius: 6px;
}

.logout-btn:hover {
    background: darkred;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4facfe;
    color: white;
}

th, td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

/* DELETE BUTTON */
.delete-btn {
    background: red;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
    <h2>Vendor System</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="link" onclick="showRegister()">Create Account</p>
</div>

<!-- REGISTER -->
<div class="container" id="registerPage" style="display:none;">
    <h2>Create Account</h2>
    <input type="text" id="regUser" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Register</button>
    <p class="link" onclick="showLogin()">Back to Login</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="header">

        <!-- PROFILE -->
        <div class="profile">
            <label for="profileUpload">
                <img id="profilePic" src="https://via.placeholder.com/40" alt="Profile">
            </label>
            <input type="file" id="profileUpload" accept="image/*" onchange="uploadProfile(event)">
            <span id="usernameDisplay"></span>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="card">
        <h3>Add Vendor</h3>
        <input type="text" id="vendorName" placeholder="Vendor Name">
        <input type="text" id="vendorEmail" placeholder="Vendor Email">
        <input type="text" id="vendorPhone" placeholder="Vendor Phone">
        <button onclick="addVendor()">Add Vendor</button>
    </div>

    <div class="card">
        <h3>Vendor List</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="vendorTable"></tbody>
        </table>
    </div>

</div>

<script>
// REGISTER
function register() {
    let user = regUser.value;
    let pass = regPass.value;

    if(user && pass) {
        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);
        alert("Registered Successfully!");
        showLogin();
    } else {
        alert("Fill all fields");
    }
}

// LOGIN
function login() {
    let user = loginUser.value;
    let pass = loginPass.value;

    if(user === localStorage.getItem("user") && pass === localStorage.getItem("pass")) {
        loginPage.style.display = "none";
        dashboard.style.display = "block";

        document.getElementById("usernameDisplay").innerText = user;

        loadVendors();
        loadProfile();
    } else {
        alert("Invalid Login");
    }
}

// PROFILE IMAGE
function uploadProfile(event) {
    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function() {
        localStorage.setItem("profilePic", reader.result);
        document.getElementById("profilePic").src = reader.result;
    }

    if(file) reader.readAsDataURL(file);
}

function loadProfile() {
    let pic = localStorage.getItem("profilePic");
    if(pic) document.getElementById("profilePic").src = pic;
}

// NAVIGATION
function showRegister() {
    loginPage.style.display = "none";
    registerPage.style.display = "block";
}

function showLogin() {
    registerPage.style.display = "none";
    loginPage.style.display = "block";
}

// ADD VENDOR
function addVendor() {
    let name = vendorName.value;
    let email = vendorEmail.value;
    let phone = vendorPhone.value;

    if(name && email && phone) {
        let vendors = JSON.parse(localStorage.getItem("vendors")) || [];
        vendors.push({name, email, phone});
        localStorage.setItem("vendors", JSON.stringify(vendors));
        loadVendors();

        vendorName.value = "";
        vendorEmail.value = "";
        vendorPhone.value = "";
    } else {
        alert("Fill all fields");
    }
}

// LOAD VENDORS
function loadVendors() {
    let vendors = JSON.parse(localStorage.getItem("vendors")) || [];
    vendorTable.innerHTML = "";

    vendors.forEach((v, i) => {
        vendorTable.innerHTML += `
        <tr>
            <td>${v.name}</td>
            <td>${v.email}</td>
            <td>${v.phone}</td>
            <td><span class="delete-btn" onclick="deleteVendor(${i})">Delete</span></td>
        </tr>`;
    });
}

// DELETE
function deleteVendor(i) {
    let vendors = JSON.parse(localStorage.getItem("vendors"));
    vendors.splice(i, 1);
    localStorage.setItem("vendors", JSON.stringify(vendors));
    loadVendors();
}

// LOGOUT
function logout() {
    location.reload();
}
</script>

</body>
</html>
